<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Feedback</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="styles/feedback.css">
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/general.css">
  <link rel="stylesheet" href="styles/footer.css">
</head>
<body>
    <div id="header"></div>

<section class="feedback-section">

  <div class="feedback-card">

    <i class="fa-solid fa-comment-medical feedback-icon"></i>

    <h1>Patient Feedback</h1>

    <p class="subtitle">
      We value your opinion. Help us improve our services by sharing your experience.
    </p>

    <form class="feedback-form">

      <div class="form-group">
        <label>Full Name</label>
        <input
          type="text"
          placeholder="Enter your name">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input
          type="email"
          placeholder="example@email.com">
      </div>

      <div class="form-group">
        <label>How would you rate our service?</label>

        <select required>
          <option value="">Select Rating</option>
          <option>⭐⭐⭐⭐⭐ Excellent</option>
          <option>⭐⭐⭐⭐ Very Good</option>
          <option>⭐⭐⭐ Good</option>
          <option>⭐⭐ Fair</option>
          <option>⭐ Poor</option>
        </select>
      </div>

      <div class="form-group">
        <label>Would you recommend us?</label>

        <div class="radio-group">
          <label>
            <input type="radio" name="recommend">
            Yes
          </label>

          <label>
            <input type="radio" name="recommend">
            No
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Your Feedback</label>

        <textarea
          rows="6"
          placeholder="Tell us about your experience..."
          required></textarea>
      </div>

      <button type="submit" class="submit-btn">
        Submit Feedback
      </button>

    </form>

  </div>

</section>

    <div id="footer"></div>

  <script src="components/components.js"></script>

</body>
</html>
